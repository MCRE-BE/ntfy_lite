name: Release

on:
  push:
    branches:
      - master
    paths:
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Build package
        run: uv build
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
