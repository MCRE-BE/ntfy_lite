[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

## #########
# PROJECT #
## #########
[project]
name = "dll-etl-ntfy-lite"
version = "2.0.0"
description = "minimalistic python API for sending ntfy notifications"
readme = "README.md"
license-files = [ "LICENSE" ]
authors = [
  { name = "Vincent Berenz", email = "vberenz@tuebingen.mpg.de" },
  { name = "Mathias Creemers", email = "mcreemers3@delhaize.be" }
]
requires-python = ">=3.13"
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [ "requests>=2.28.2,<3", "validators>=0.20,<1" ]

[dependency-groups]
dev = [
  "basedpyright>0",
  "pytest>0",
  "ruff>0",
]

## #####
# TOOL #
## #####
[tool.hatch]
build.targets.wheel.packages = [ "dll_etl" ]

[tool.uv]
sources = {}

[tool.pyright]
venvPath = "../.."
venv = ".venv"
strict = [ "**/*.py" ]
pythonVersion = "3.13"
