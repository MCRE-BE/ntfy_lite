[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

## #########
# PROJECT #
## #########
[project]
name = "ntfy_lite"
version = "2.0.1"
description = "minimalistic python API for sending ntfy notifications"
readme = "README.md"
license-files = [ "LICENSE" ]
authors = [
  { name = "Vincent Berenz", email = "vberenz@tuebingen.mpg.de" },
  { name = "Mathias Creemers", email = "mcreemers3@delhaize.be" }
]
requires-python = ">=3.10"
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dependencies = [
  "requests>=2.28.2",
  "validators>=0.20.0",
]

[project.optional-dependencies]
buffer = [
  "pysqlite3",
]

[dependency-groups]
dev = [
  "basedpyright>0",
  "pytest>0",
  "ruff>0",
]

## #####
# TOOL #
## #####
[tool.hatch]
build.targets.wheel.packages = [ "ntfy_lite" ]

[tool.pyright]
venv = ".venv"
strict = [ "**/*.py" ]
pythonVersion = "3.10"
