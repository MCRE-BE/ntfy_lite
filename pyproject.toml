###########
# PROJECT #
###########
[project]
version = "2.0.0"
name = "dll_etl-ntfy_lite"
description = "minimalistic python API for sending ntfy notifications"
authors = [
      {name = "Vincent Berenz", email = "vberenz@tuebingen.mpg.de"},
      { name = "Mathias Creemers", email = "mcreemers3@delhaize.be" }
]
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies =  [
    "requests >= 2.28.2, < 3",
    "validators >= 0.20.0, < 1"
]
license-files = ["LICENSE"]
readme = "README.md"

[dependency-groups]
dev = [
    "basedpyright>0",
    "poethepoet>0",
    "pytest>0",
    "ruff>0",
]

[tool.uv.sources]


[tool.pyright]
venvPath = "../.."
venv = ".venv"
strict = ["**/*.py"]
pythonVersion = "3.13"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dll_etl"]
